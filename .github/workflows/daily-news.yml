name: Daily News Refresh

on:
  schedule:
    # 每6小时运行一次（UTC），大幅增加命中概率
    - cron: '0 */6 * * *'
  # 支持手动触发（在 GitHub 页面点 "Run workflow" 按钮）
  workflow_dispatch:

# 关键：授予写入权限
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 新闻项目/requirements.txt

      - name: Run news scraper
        run: |
          cd 新闻项目
          python news.py --once

      - name: Commit & push if changed
        run: |
          git config user.name "news-bot"
          git config user.email "actions@github.com"
          git add 新闻项目/index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: 每日新闻刷新 $(date +'%Y-%m-%d')"
          git push
