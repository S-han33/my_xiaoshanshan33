name: Daily News Refresh

on:
  schedule:
    # 姣忓ぉ UTC 00:00 = 鍖椾含鏃堕棿 08:00
    - cron: '0 0 * * *'
  # 鏀寔鎵嬪姩瑙﹀彂锛堝湪 GitHub 椤甸潰鐐?"Run workflow" 鎸夐挳锛?  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run news scraper
        run: |
          cd 鏂伴椈椤圭洰
          python news.py --once

      - name: Commit & push if changed
        run: |
          git config user.name "news-bot"
          git config user.email "actions@github.com"
          git add 鏂伴椈椤圭洰/index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: 姣忔棩鏂伴椈鍒锋柊 $(date +'%Y-%m-%d')"
          git push
